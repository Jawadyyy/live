name: live
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  supabase_flutter: ^2.9.1
  intl_phone_field: ^3.2.0
  google_sign_in: ^6.3.0
  google_nav_bar: ^5.0.7
  line_icons: ^2.0.3
  http: ^1.4.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  get: ^4.7.2
  timeago: ^3.7.1
  emoji_picker_flutter: ^4.3.0
  file_picker: ^8.1.7
  open_filex: ^4.6.0
  path: ^1.9.0
  agora_rtc_engine: ^6.5.3
  permission_handler: ^12.0.1
  flutter_sound: ^9.30.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

# Add this configuration for launcher icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"  # Make sure you have an icon here
  adaptive_icon_background: "#ffffff"  # Optional: background color for Android adaptive icon
  adaptive_icon_foreground: "assets/icons/app_icon.png"  # Optional: foreground for adaptive icon